    <style>
        .contact-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('images/Emirates-groups.jpg') center center / cover no-repeat fixed;
            overflow: hidden;
        }

        .contact-wrapper .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .constrained-container {
            width: 82%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: flex-start;
        }

        .top-overview-section-grid.c {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 90px;
        }

        /* Ensure contact form label visibility */
        .form-group label {
            color: #d7d7d7;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 9px;
        }

        .form-footer-inline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .form-footer-text {
            flex: 1;
        }
    </style>
</head>


<body>
    <div>
        <!-- navbar -->
        <nav class="main-navbar"></nav>
        <div class="contact-wrapper">
            <div class="overlay"></div>

            <div class="constrained-container">
                <div class="top-overview-section-grid c  contact">
                    <div class="over-view-top-grid">
                        <h1 style="color:black; display: none;">Contact EGS Capital Limited – Global Investment Advisory
                        </h1>
                        <h2 class="heading o"><a title="link" href="#">Contact us</a></h2>
                        <p class="text h"><a title="link" href="#">For Professional Clients and Market Counterparties
                                only</a></p>
                    </div>

                    <form id="userForm" class="form-section">
                    <div class="form-group">
                        <label for="fullName">Name in Full</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" pattern="^[0-9]{10}$" required>
                    </div>

                    <div class="form-group">
                        <label for="enquiry" class="enquiry">Enquiry</label>
                        <textarea id="enquiry" name="enquiry" maxlength="500" rows="4" required></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="consent" name="consent" class="check-box-section" required>
                            I confirm that I am a Professional Client / Market Counterparty.
                        </label>
                    </div>

                    <div class="form-footer-inline">
                        <div class="form-footer-text">
                            <p class="text" style="font-size: 9px;"><a title="link" href="#">All submissions are subject to internal review.</a></p>
                            <p class="text" style="font-size: 9px;"><a title="link" href="#">Only relevant introductions will receive a response.</a></p>
                        </div>
                        <button type="submit">Submit</button>
                    </div>
                </form>
                <p id="submissionMessage" class="submission-message" style="display: none;">Done..!</p>
                </div>
            </div>
        </div>

        <!-- footer-component -->
        <div class="footer-component"></div>

        <script src="./components.js"></script>
    </div>


    <script>
        const form = document.getElementById('userForm');
        const message = document.getElementById('submissionMessage');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            if (form.checkValidity()) {
                message.style.display = 'block';  // Show the "Done..!" message

                setTimeout(() => {
                    window.location.href = 'home.html'; // Redirect after 3 seconds
                }, 3000);
            } else {
                form.reportValidity();
            }
        });
    </script>
</body>
