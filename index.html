  <style>
    /* Container (fixed overlay; does not push/shift layout) */
    #egs-important-notice.egs-notice {
      position: fixed;
      left: 50%;
      top: 50%;
      /* bottom: 0; */
      width: min(83%, 100vw);
      z-index: 99999;
      box-sizing: border-box;

      /* Hidden state (slide below viewport) */
      transform: translate(-50%, -50%) scale(0.9);
      opacity: 0;
      pointer-events: none;
      transition: transform 280ms ease, opacity 280ms ease;

      background: rgba(12, 12, 12, 0.94);


    }

    /* Visible state */
    #egs-important-notice.egs-notice.egs-notice--visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;

    }

    /* Panel styling */
    #egs-important-notice .egs-notice__panel {
      position: relative;
      /* background: rgba(12, 12, 12, 0.94); */
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px 14px 0 0;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);

      padding: 18px 18px calc(14px + env(safe-area-inset-bottom));
      /* “Bottom half” behaviour */
      max-height: 100vh;
      overflow: hidden;
      border-radius: 10px;
      padding: 50px 50px 30px;

    }

    #egs-important-notice .egs-notice__title {
      margin: 0 40px 10px 0;
      font-size: 28px;
      font-weight: 650;
      padding-bottom: 10px;
      letter-spacing: 0.2px;
      font-family: "Avenir", sans-serif;
    }

    #egs-important-notice .egs-notice__body p {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 2.2;
      font-family: "Avenir", sans-serif;
      font-size: 12.9px;
      margin: 0;
      color: #d7d7d7;
      font-weight: 100;
      word-spacing: -0.06rem;
    }

    #egs-important-notice .egs-notice__body a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-family: "Avenir", sans-serif;
    }

    /* Close (X) */
    #egs-important-notice .egs-notice__x {
      position: absolute;
      top: 10px;
      right: 10px;

      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;

      background: transparent;
      color: inherit;
      font-size: 26px;
      line-height: 1;
    }

    #egs-important-notice .egs-notice__x:focus-visible,
    #egs-important-notice .egs-notice__btn:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: 2px;
    }

    /* Actions */
    #egs-important-notice .egs-notice__actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;

      margin-top: 8px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    #egs-important-notice .egs-notice__btn {
      appearance: none;
      border: 0;
      cursor: pointer;
      border-radius: 10px;
      padding: 10px 12px;

      background: #ffffff;
      color: #000000;
      font-size: 14px;
      font-weight: 100;
      font-family: "Avenir", sans-serif;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      /* #egs-important-notice.egs-notice {

    } */

  <!-- Script to handle video end and reveal content -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("introVideo");
      const content = document.getElementById("mainContent");

      if (!video || !content) return;

      function revealContent() {
        if (!content.classList.contains("content-visible")) {
          content.classList.add("content-visible");
        }
      }

      // Show content when video ends
      video.addEventListener("ended", revealContent);

      // Show content if video fails to load
      video.addEventListener("error", revealContent);

      // Fallback: If video is taking too long (e.g. 7s), reveal content anyway
      // This handles cases where video is long but user wants to see the menu
      setTimeout(revealContent, 7000);

      // If video is already ended or can't play, reveal
      if (video.ended) {
        revealContent();
      }
    });
  </script>

  <script>
    (function () {
      'use strict';

      /**
       * CONFIG
       * - MIN_DELAY_MS_FROM_NAV_START: ~9s after page navigation begins (not after snippet loads)
       * - Video logic: waits for the intro video to END or to become PAUSED after it has played
       */
      var MIN_DELAY_MS_FROM_NAV_START = 9000;  // ~9 seconds
      var MAX_WAIT_FOR_VIDEO_MS = 20000;       // fallback if video never ends/pauses

      /**
       * Dismissal persistence:
       * - Set DISMISS_DAYS = 0 to show on every visit (no persistence)
       * - Set DISMISS_DAYS = 1 to hide for 1 day after closing, etc.
       */
      var DISMISS_DAYS = 1;
      var STORAGE_KEY = 'egs_important_notice_dismissed_until';

      var notice = document.getElementById('egs-important-notice');
      if (!notice) return;

      function now() { return Date.now(); }
      function msDays(days) { return days * 24 * 60 * 60 * 1000; }

      function isDismissed() {
        try {
          if (DISMISS_DAYS <= 0) return false;
          var until = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
          return until && now() < until;
        } catch (e) {
          return false;
        }
      }

      function setDismissed() {
        try {
          if (DISMISS_DAYS > 0) {
            localStorage.setItem(STORAGE_KEY, String(now() + msDays(DISMISS_DAYS)));
          }
        } catch (e) { }
      }

      function show() {
        if (notice.classList.contains('egs-notice--visible')) return;
        notice.classList.add('egs-notice--visible');
        notice.setAttribute('aria-hidden', 'false');

        // Optional: move focus to the close/ack button (does not scroll)
        var btn = notice.querySelector('[data-egs-notice-close]');
        if (btn && typeof btn.focus === 'function') btn.focus({ preventScroll: true });
      }

      function hide() {
        notice.classList.remove('egs-notice--visible');
        notice.setAttribute('aria-hidden', 'true');
      }

      function close() {
        hide();
        setDismissed();
      }

      // Close interactions
      notice.addEventListener('click', function (e) {
        var t = e.target;
        if (!t) return;

        if (t.matches('[data-egs-notice-close]') || t.matches('.egs-notice__x')) {
          e.preventDefault();
          close();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && notice.classList.contains('egs-notice--visible')) close();
      });

      function delay(ms) {
        return new Promise(function (res) { setTimeout(res, ms); });
      }

      // Wait until N ms after navigation start (not after snippet injection)
      function delayUntil(msFromNavStart) {
        var perfNow = (window.performance && typeof window.performance.now === 'function')
          ? window.performance.now()
          : 0;
        var remaining = Math.max(0, msFromNavStart - perfNow);
        return delay(remaining);
      }

      /**
       * VIDEO TARGETING
       * If you can identify the hero video element, replace findIntroVideo()
       * with a precise selector (recommended), e.g.:
       *   return document.querySelector('#heroVideo');
       */
      function findIntroVideo() {
        return document.querySelector('video[autoplay], header video, .hero video, video');
      }

      function waitForVideoElement(maxWaitMs) {
        return new Promise(function (resolve) {
          var v = findIntroVideo();
          if (v) return resolve(v);

          var start = now();
          var poll = setInterval(function () {
            var candidate = findIntroVideo();
            if (candidate) {
              clearInterval(poll);
              resolve(candidate);
            } else if (now() - start >= maxWaitMs) {
              clearInterval(poll);
              resolve(null);
            }
          }, 250);
        });
      }

      function waitForVideoToStop(video, timeoutMs) {
        return new Promise(function (resolve) {
          if (!video) return resolve('no-video');

          // Already stopped?
          if (video.ended) return resolve('ended');
          if (video.paused && video.currentTime > 0.5) return resolve('paused');

          var hasPlayed = false;

          function done(reason) {
            cleanup();
            resolve(reason);
          }

          function onPlaying() { hasPlayed = true; }
          function onEnded() { done('ended'); }
          function onPause() {
            // Only treat pause as "stop" if it previously played
            if (hasPlayed && video.currentTime > 0.5) done('paused');
          }

          function onTimeUpdate() {
            // Safety: if currentTime reaches duration (near-end), treat as stopped
            if (video.duration && !isNaN(video.duration) && video.currentTime >= (video.duration - 0.15)) {
              done('near-end');
            }
          }

          function cleanup() {
            video.removeEventListener('playing', onPlaying);
            video.removeEventListener('ended', onEnded);
            video.removeEventListener('pause', onPause);
            video.removeEventListener('timeupdate', onTimeUpdate);
            clearTimeout(t);
          }

          video.addEventListener('playing', onPlaying);
          video.addEventListener('ended', onEnded, { once: true });
          video.addEventListener('pause', onPause);
          video.addEventListener('timeupdate', onTimeUpdate);

          var t = setTimeout(function () { done('timeout'); }, timeoutMs);
        });
      }

      function init() {
        if (isDismissed()) return;

        Promise.all([
          // Never show earlier than ~9 seconds after navigation start
          delayUntil(MIN_DELAY_MS_FROM_NAV_START),

          // Wait for intro video to stop (ended/paused). If no video exists (or never stops), we still proceed.
          waitForVideoElement(5000).then(function (video) {
            return waitForVideoToStop(video, MAX_WAIT_FOR_VIDEO_MS);
          })
        ]).then(show);
      }

      // Run reliably regardless of where snippet is injected
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
