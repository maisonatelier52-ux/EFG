  <style>
    .expertise-wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: url('images/egs.jpeg') center center / cover no-repeat;
    }

    .expertise-wrapper .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .constrained-container {
      width: 82%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 50px;
    }

    .expertise-content {
      display: flex;
      align-items: flex-start;
      gap: 48px;
      color: white;
      justify-content: space-between;
      width: 100%;
    }

    .expertise-title {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      font-weight: 400;
      color: white;
      line-height: 1.1;
      letter-spacing: -0.02em;
      flex: 0 0 40%;
    }

    .expertise-description {
      font-size: 13px;
      font-weight: 300;
      color: white;
      line-height: 1.6;
      max-width: 450px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .expertise-content {
        flex-direction: column;
        gap: 16px;
        padding: 24px 20px 28px;
      }

      .expertise-title {
        flex: none;
        font-size: 1.6rem;
      }

      .expertise-description {
        max-width: 100%;
      }
    }
  </style>
</head>

  <div>
